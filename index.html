<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>3D Memory Cake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="page-bg"></div>

  <div id="dark-overlay"></div>

  <header class="hero">
    <p class="eyebrow">Tort dilimlərinin üzərinə bas</p>
    <h1>Ad Günün Mübarək, Anacan!</h1>
  </header>

  <main class="app-shell">
    <aside class="ui-panel">
      <div class="status-card">
        <div class="status-title">Memories</div>
        <div id="statusText">Click on a slice to reveal a memory!</div>
      </div>

      <button id="presentBtn" type="button">Start presentation</button>
      <button id="resetBtn" type="button">Reset cake</button>
    </aside>

    <section class="canvas-wrap">
      <div id="scene"></div>
    </section>
  </main>

  <section id="presentationModal" class="presentation-modal" aria-hidden="true">
    <div class="presentation-card" role="dialog" aria-modal="true" aria-label="Memory presentation">
      <img id="presentationImage" alt="Memory slide" />
      <div class="presentation-footer">
        <div id="presentationCaption"></div>
        <div id="presentationCounter"></div>
      </div>
      <div class="presentation-controls">
        <button id="prevSlideBtn" type="button">Previous</button>
        <button id="nextSlideBtn" type="button">Next</button>
        <button id="closePresentationBtn" type="button">Close</button>
      </div>
    </div>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
